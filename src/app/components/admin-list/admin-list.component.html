<div class="al-page">

  <!-- ── Hero ──────────────────────────────────────────────────────── -->
  <div class="al-hero">
    <div class="al-hero-left">
      <div class="al-hero-icon">🛡️</div>
      <div>
        <h1 class="al-hero-title">Administrators</h1>
        <p class="al-hero-sub">Manage system admin accounts</p>
      </div>
    </div>
    <button *ngIf="loggedInUserRole === 'SUPER_ADMIN'" class="al-hero-btn" (click)="navigateToRegisterAdmin()">
      + Register Admin
    </button>
    <div class="al-blob al-blob-1"></div>
    <div class="al-blob al-blob-2"></div>
  </div>

  <!-- ── Loading ───────────────────────────────────────────────────── -->
  <div class="al-loading" *ngIf="isLoading">
    <div class="al-spinner"></div>
    <p>Loading administrators...</p>
  </div>

  <!-- ── List ──────────────────────────────────────────────────────── -->
  <ng-container *ngIf="!isLoading">

    <div class="al-empty" *ngIf="admins.length === 0">
      <div class="al-empty-icon">🔍</div>
      <p class="al-empty-title">No administrators found</p>
    </div>

    <div class="al-section" *ngIf="admins.length > 0">
      <div class="al-section-header">
        <span class="al-section-dot"></span>
        <h2 class="al-section-title">All Admins</h2>
        <span class="al-section-count">{{ admins.length }}</span>
      </div>
      <div class="al-list">
        <div class="al-item" *ngFor="let admin of admins; trackBy: trackByAdminId"
          (click)="viewAdminDetails(admin.adminId)">
          <div class="al-avatar">{{ admin.name.charAt(0).toUpperCase() }}</div>
          <div class="al-item-info">
            <span class="al-item-name">{{ admin.name }}</span>
            <span class="al-item-id">{{ admin.adminId }}</span>
          </div>
          <button *ngIf="loggedInUserRole === 'SUPER_ADMIN'" class="al-delete-btn"
            (click)="deleteAdmin($event, admin.adminId)" title="Delete">✕</button>
          <span class="al-arrow">›</span>
        </div>
      </div>
    </div>

  </ng-container>

</div>
