<div class="tl-page">

  <!-- ── Hero ─────────────────────────────────────────────────────── -->
  <div class="tl-hero">
    <div class="tl-hero-left">
      <div class="tl-hero-icon">👨‍🏫</div>
      <div>
        <h1 class="tl-hero-title">Teachers</h1>
        <p class="tl-hero-sub">{{ teachers.length }} staff member{{ teachers.length !== 1 ? 's' : '' }}</p>
      </div>
    </div>
    <div class="tl-hero-right">
      <button class="tl-import-btn" (click)="navigateToBulkImport()">⬆ Bulk Import</button>
    </div>
    <div class="tl-blob tl-blob-1"></div>
    <div class="tl-blob tl-blob-2"></div>
  </div>

  <!-- ── Skeleton ─────────────────────────────────────────────────────── -->
  <div class="tl-section" *ngIf="isLoading">
    <div class="tl-section-header">
      <span class="sk-shimmer" style="width:100px;height:14px"></span>
      <span class="sk-shimmer" style="width:22px;height:14px;border-radius:10px"></span>
    </div>
    <div class="tl-list">
      <div class="tl-card" *ngFor="let _ of [1,2,3,4,5,6]" style="cursor:default;pointer-events:none">
        <div class="sk-shimmer" style="width:44px;height:44px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px">
          <span class="sk-shimmer" style="width:52%;height:13px"></span>
          <span class="sk-shimmer" style="width:36%;height:10px"></span>
        </div>
        <span class="sk-shimmer" style="width:16px;height:16px;border-radius:4px"></span>
      </div>
    </div>
  </div>

  <!-- ── Empty ──────────────────────────────────────────────────────── -->
  <div class="tl-empty" *ngIf="!isLoading && teachers.length === 0">
    <div class="tl-empty-icon">🔍</div>
    <p class="tl-empty-title">No teachers found</p>
    <p class="tl-empty-sub">No teacher records available</p>
  </div>

  <!-- ── Teacher List ──────────────────────────────────────────────── -->
  <div class="tl-section" *ngIf="!isLoading && teachers.length > 0">
    <div class="tl-section-header">
      <h2 class="tl-section-title">All Teachers</h2>
      <span class="tl-section-count">{{ teachers.length }}</span>
    </div>
    <div class="tl-list">
      <div class="tl-card" *ngFor="let t of teachers; trackBy: trackByTeacherId"
        (click)="viewTeacherDetails(t.teacherId)">
        <div class="tl-avatar">{{ t.name.charAt(0).toUpperCase() }}</div>
        <div class="tl-card-info">
          <span class="tl-card-name">{{ t.name }}</span>
          <span class="tl-card-id">{{ t.teacherId }}</span>
        </div>
        <span class="tl-arrow">›</span>
      </div>
    </div>
  </div>

</div>
